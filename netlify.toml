[build]
  # Build command
  command = "npm run build"
  
  # Output directory
  publish = "dist"

[build.environment]
  # Node version
  NODE_VERSION = "18"

# Headers für bessere Performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache-Control für Assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Robots.txt - Hochzeits-Landingpages von Suchmaschinen ausschließen
# WICHTIG: Erstelle eine robots.txt Datei in src/ mit folgendem Inhalt:
# User-agent: *
# Disallow: /hochzeiten/*/
# Allow: /hochzeiten/$
